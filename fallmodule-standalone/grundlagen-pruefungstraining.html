<!DOCTYPE html> <html lang="de"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Grundlagen Strahlentherapie – Prüfungstraining</title> <style> :root {   --color-primary: #1a4f7a;   --color-primary-light: #2c6ea6;   --color-correct: #1e6e42;   --color-correct-bg: #e8f5ee;   --color-wrong: #8b1a1a;   --color-wrong-bg: #fdf0f0;   --color-missed: #7a5a00;   --color-missed-bg: #fdf7e3;   --color-neutral: #4a5568;   --color-border: #d1d9e0;   --color-surface: #f8f9fa;   --radius: 8px;   --shadow: 0 2px 8px rgba(0,0,0,0.08);   --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; } * { box-sizing: border-box; margin: 0; padding: 0; } body {   font-family: var(--font);   background: #f0f4f8;   color: #1a1a2e;   line-height: 1.6;   min-height: 100vh;   padding: 24px 16px; } .quiz-wrapper, .quiz-intro, .quiz-result {   max-width: 720px;   margin: 0 auto;   background: #fff;   border-radius: 12px;   padding: 32px;   box-shadow: var(--shadow); } .quiz-intro__badge {   display: inline-block;   background: var(--color-primary);   color: #fff;   font-size: 0.75rem;   font-weight: 600;   padding: 3px 10px;   border-radius: 20px;   letter-spacing: 0.05em;   text-transform: uppercase;   margin-bottom: 12px; } .quiz-intro__title { font-size: 1.6rem; font-weight: 700; color: var(--color-primary); margin-bottom: 6px; } .quiz-intro__subtitle { font-size: 1rem; color: var(--color-neutral); margin-bottom: 12px; } .quiz-intro__desc {   font-size: 0.95rem; color: #555; margin-bottom: 20px;   background: var(--color-surface); padding: 12px 16px;   border-radius: var(--radius); border-left: 3px solid var(--color-primary-light); } .quiz-intro__meta { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; font-size: 0.9rem; color: var(--color-neutral); } .quiz-intro__tiers { display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; } .quiz-tier-pill {   background: var(--color-surface); border: 1px solid var(--color-border);   border-radius: var(--radius); padding: 10px 14px; } .quiz-tier-pill strong { font-size: 0.9rem; color: var(--color-primary); display: block; } .quiz-tier-pill span { font-size: 0.82rem; color: var(--color-neutral); } .quiz-progress { margin-bottom: 20px; } .quiz-progress__bar { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin-bottom: 6px; } .quiz-progress__fill { height: 100%; background: var(--color-primary); border-radius: 3px; transition: width 0.3s ease; } .quiz-progress__label { font-size: 0.8rem; color: var(--color-neutral); text-align: right; } .quiz-tier-label { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; } .quiz-tier-badge {   background: var(--color-primary); color: #fff;   font-size: 0.72rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; } .quiz-tier-desc { font-size: 0.82rem; color: var(--color-neutral); } .quiz-case-context {   background: #eef4fb; border: 1px solid #b8d0e8;   border-radius: var(--radius); padding: 14px 16px; margin-bottom: 20px; } .quiz-case-badge {   display: inline-block; font-size: 0.72rem; font-weight: 700;   text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-primary);   background: #c8dff2; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; } .quiz-case-context p { font-size: 0.9rem; color: #2d4a6a; line-height: 1.5; } .quiz-question { margin-bottom: 20px; } .quiz-question__stem { font-size: 1.05rem; font-weight: 600; color: #1a1a2e; line-height: 1.5; margin-bottom: 6px; } .quiz-question__hint { font-size: 0.82rem; color: var(--color-neutral); font-style: italic; } .quiz-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; } .quiz-option {   display: flex; align-items: flex-start; gap: 12px;   padding: 12px 14px; border: 2px solid var(--color-border);   border-radius: var(--radius); cursor: pointer;   transition: border-color 0.15s, background 0.15s; } .quiz-option:hover:not(.quiz-option--locked) { border-color: var(--color-primary-light); background: #f0f7ff; } .quiz-option input { margin-top: 3px; accent-color: var(--color-primary); flex-shrink: 0; } .quiz-option--selected { border-color: var(--color-primary); background: #f0f7ff; } .quiz-option--correct { border-color: var(--color-correct); background: var(--color-correct-bg); } .quiz-option--wrong { border-color: var(--color-wrong); background: var(--color-wrong-bg); } .quiz-option--missed { border-color: var(--color-missed); background: var(--color-missed-bg); } .quiz-option--locked { cursor: default; } .quiz-option__text { font-size: 0.95rem; flex: 1; line-height: 1.5; } .quiz-option__icon { font-weight: 700; font-size: 1rem; flex-shrink: 0; } .quiz-option--correct .quiz-option__icon { color: var(--color-correct); } .quiz-option--wrong .quiz-option__icon { color: var(--color-wrong); } .quiz-option--missed .quiz-option__icon { color: var(--color-missed); } .quiz-feedback {   padding: 14px 16px; border-radius: var(--radius); margin-bottom: 20px; border-left: 4px solid; } .quiz-feedback--correct { background: var(--color-correct-bg); border-color: var(--color-correct); } .quiz-feedback--incorrect { background: var(--color-wrong-bg); border-color: var(--color-wrong); } .quiz-feedback__label { font-weight: 700; font-size: 0.9rem; margin-bottom: 6px; } .quiz-feedback--correct .quiz-feedback__label { color: var(--color-correct); } .quiz-feedback--incorrect .quiz-feedback__label { color: var(--color-wrong); } .quiz-feedback__text { font-size: 0.9rem; line-height: 1.6; color: #333; } .quiz-actions { display: flex; justify-content: flex-end; gap: 12px; } .btn {   padding: 10px 22px; border-radius: var(--radius); font-size: 0.95rem;   font-weight: 600; border: none; cursor: pointer; transition: background 0.15s, opacity 0.15s; } .btn:disabled { opacity: 0.4; cursor: not-allowed; } .btn--primary { background: var(--color-primary); color: #fff; } .btn--primary:hover:not(:disabled) { background: var(--color-primary-light); } .btn--secondary { background: var(--color-surface); color: var(--color-primary); border: 2px solid var(--color-border); } .btn--secondary:hover:not(:disabled) { border-color: var(--color-primary); } .btn--lg { padding: 14px 32px; font-size: 1.05rem; width: 100%; } .quiz-result__header { text-align: center; padding: 28px 20px; border-radius: var(--radius); margin-bottom: 28px; } .result--1 { background: #e8f5ee; } .result--2 { background: #edf7e8; } .result--3 { background: #fdf7e3; } .result--4 { background: #fef3e2; } .result--5 { background: #fdf0f0; } .quiz-result__note { font-size: 3rem; font-weight: 800; color: var(--color-primary); } .quiz-result__label { font-size: 1.2rem; font-weight: 700; margin: 4px 0; } .quiz-result__score, .quiz-result__time { font-size: 0.95rem; color: var(--color-neutral); } .quiz-result__breakdown, .quiz-result__review { margin-bottom: 28px; } .quiz-result__breakdown h3, .quiz-result__review h3 {   font-size: 1rem; font-weight: 700; color: var(--color-primary);   margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid var(--color-border); } .quiz-result__tier { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; } .quiz-result__tier-label { font-size: 0.82rem; color: var(--color-neutral); width: 200px; flex-shrink: 0; } .quiz-result__tier-bar { flex: 1; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; } .quiz-result__tier-fill { height: 100%; background: var(--color-primary); border-radius: 4px; } .quiz-result__tier-score { font-size: 0.82rem; font-weight: 600; width: 80px; text-align: right; flex-shrink: 0; } .quiz-result__wrong-item {   background: var(--color-surface); border: 1px solid var(--color-border);   border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; } .quiz-result__wrong-stem { font-size: 0.88rem; color: #333; margin-bottom: 6px; } .quiz-result__wrong-answer { font-size: 0.85rem; color: var(--color-correct); } .quiz-result__all-correct { font-size: 0.95rem; color: var(--color-correct); font-weight: 600; } .quiz-result__actions { display: flex; gap: 12px; flex-wrap: wrap; }  /* Transfer-Modul */ .transfer-wrapper { max-width: 720px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 32px; box-shadow: var(--shadow); } .transfer-badge { display: inline-block; background: #4a5568; color: #fff; font-size: 0.75rem; font-weight: 600; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; margin-bottom: 12px; } .transfer-title { font-size: 1.4rem; font-weight: 700; color: var(--color-primary); margin-bottom: 16px; } .transfer-case { background: #eef4fb; border: 1px solid #b8d0e8; border-radius: var(--radius); padding: 14px 16px; margin-bottom: 20px; font-size: 0.95rem; color: #2d4a6a; line-height: 1.6; } .transfer-case h4 { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-primary); margin-bottom: 8px; } .transfer-question { font-size: 1rem; font-weight: 600; color: #1a1a2e; margin-bottom: 12px; } .transfer-textarea {   width: 100%; min-height: 160px; padding: 12px 14px;   border: 2px solid var(--color-border); border-radius: var(--radius);   font-size: 0.95rem; font-family: var(--font); resize: vertical;   line-height: 1.6; color: #333; margin-bottom: 16px; } .transfer-textarea:focus { outline: none; border-color: var(--color-primary); } .transfer-sample { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 20px; display: none; } .transfer-sample h4 { font-size: 0.85rem; font-weight: 700; color: var(--color-correct); margin-bottom: 8px; } .transfer-sample p { font-size: 0.9rem; line-height: 1.6; color: #333; } .transfer-checklist { margin-bottom: 24px; display: none; } .transfer-checklist h4 { font-size: 0.9rem; font-weight: 700; color: var(--color-primary); margin-bottom: 10px; } .transfer-check-item { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; } .transfer-check-item input[type=checkbox] { margin-top: 3px; accent-color: var(--color-primary); flex-shrink: 0; width: 16px; height: 16px; } .transfer-check-item label { font-size: 0.9rem; color: #333; cursor: pointer; } @media (max-width: 600px) {   .quiz-wrapper, .quiz-intro, .quiz-result, .transfer-wrapper { padding: 20px 14px; }   .quiz-tier-label { flex-direction: column; align-items: flex-start; }   .quiz-result__tier { flex-wrap: wrap; }   .quiz-result__tier-label { width: 100%; } }  /* P1: Feedback summary + expandable detail */ .feedback-summary { font-size:.93rem; font-weight:700; line-height:1.5; margin-bottom:0; } .feedback-detail { font-size:.88rem; line-height:1.6; color:#333; margin-top:8px; } .feedback-detail.hidden { display:none; } .feedback-toggle { background:none; border:none; cursor:pointer; font-size:.8rem; font-weight:600; padding:4px 0; margin-top:6px; text-decoration:underline; } .feedback.correct .feedback-toggle { color:var(--correct); } .feedback.wrong .feedback-toggle { color:var(--wrong); } /* P1: Situation key fact highlight */ .key-fact { font-weight:700; color:#1a1a2e; background:#dbeafe; padding:1px 4px; border-radius:3px; } /* P1: Competency labels in result */ .comp-label { display:inline-block; background:var(--surface); border:1px solid var(--border); border-radius:12px; font-size:.78rem; padding:2px 10px; margin:2px; color:var(--neutral); } .comp-label.done { background:var(--correct-bg); color:var(--correct); border-color:var(--correct); }  .quiz-feedback__detail.hidden { display: none; } </style> </head> <body> <div id="app"></div>  <script> const MODULE = {   "id": "grundlagen-pruefungstraining-quiz",   "type": "quiz",   "pool_mode": true,   "draw_count": 15,   "draw_per_tier": 5,   "title": "Grundlagen Strahlentherapie – Prüfungstraining",   "subtitle": "Prüfungsvorbereitung 3. Lehrjahr",   "description": "15 zufällig gewählte Fragen aus einem Pool von 45 prüfungsrelevanten Aufgaben. Bei jedem Start erhältst du eine neue Auswahl – Stufe 1: Klinische Szenarien | Stufe 2: Multiple Select | Stufe 3: Fallkette.",   "estimated_minutes": 20,   "tiers": [     {       "id": "tier1",       "label": "Stufe 1 – Klinisches Szenario",       "description": "Single Choice mit klinischem Fallbezug",       "questions": [         { "id": "t1_q01", "type": "single", "stem": "Der Bestrahlungsplan eines Patienten zeigt im PTV einen Dmax-Wert von 113%. Der Radioonkologe fragt dich nach einer Einschätzung. Welche Aussage ist korrekt?", "options": [ { "id": "a", "text": "Akzeptabel, da der Wert unter 120% liegt." }, { "id": "b", "text": "Grenzwertig – laut ICRU 50/62 sollte Dmax im PTV ≤107% betragen.", "correct": true }, { "id": "c", "text": "Irrelevant, da nur der Dmin-Wert für die Planbeurteilung zählt." }, { "id": "d", "text": "Der Plan muss sofort verworfen werden, jeder Wert über 110% ist unzulässig." } ], "feedback": { "correct": "Richtig. Die ICRU empfiehlt Dmax ≤107% im PTV. Ein Wert von 113% überschreitet diese Grenze und erfordert Überarbeitung – jedoch keinen sofortigen Abbruch, sondern Rücksprache mit dem Planungsteam.", "incorrect": "Nicht korrekt. Die ICRU 50/62 definiert als Obergrenze für Dmax im PTV 107%. Werte darüber sind planungsrelevant und müssen mit dem Radioonkologen besprochen werden." } },         { "id": "t1_q02", "type": "single", "stem": "Bei einer 6 MV Photonenbestrahlung liegt das Dosismaximum bei ca. 1,5 cm Tiefe. Ein Patient mit einem oberflächlichen Hauttumor (3 mm Tiefe) soll behandelt werden. Welche Konsequenz ergibt sich für die Planung?", "options": [ { "id": "a", "text": "6 MV Photonen sind ideal, da sie tief eindringen." }, { "id": "b", "text": "Es wird ein Keilfilter benötigt, um das Dosismaximum anzuheben." }, { "id": "c", "text": "Eine Moulage (Bolus) wird benötigt, um das Dosismaximum an die Hautoberfläche zu verlagern.", "correct": true }, { "id": "d", "text": "15 MV Photonen wären besser geeignet, da deren Dosismaximum oberflächlicher liegt." } ], "feedback": { "correct": "Richtig. Der Aufbaueffekt bei Photonen bewirkt, dass Dmax tiefer liegt als die Hautoberfläche. Eine Moulage hebt die Isodosen an die Oberfläche. 15 MV hat ein noch tieferes Dosismaximum (~2,5–3 cm) und wäre kontraproduktiv.", "incorrect": "Nicht korrekt. Bei 6 MV liegt Dmax bei ca. 1,5 cm – der oberflächliche Tumor wäre unterversorgt. Durch eine Moulage wird das Dosismaximum an die Hautoberfläche gezogen." } },         { "id": "t1_q03", "type": "single", "stem": "Ein Patient berichtet 4 Monate nach Abschluss seiner Beckenbestrahlung über persistierende Blasenprobleme. Um welche Strahlenfolge handelt es sich?", "options": [ { "id": "a", "text": "Akute Strahlenfolge, da sie im zeitlichen Zusammenhang mit der Bestrahlung steht." }, { "id": "b", "text": "Chronische Strahlenfolge, da sie nach dem 90. Tag nach Bestrahlungsende aufgetreten ist.", "correct": true }, { "id": "c", "text": "Subakute Strahlenfolge – ein gesonderter Begriff der Radioonkologie." }, { "id": "d", "text": "Keine Strahlenfolge, da 4 Monate ein zu langer Zeitraum ist." } ], "feedback": { "correct": "Richtig. Chronische Strahlenfolgen beginnen ab dem 91. Tag nach Bestrahlungsbeginn und sind häufig irreversibel (z.B. Schrumpfblase, Proktitis, Fibrose).", "incorrect": "Nicht korrekt. Die zeitliche Grenze liegt beim 90. Tag. Symptome ab dem 91. Tag gelten als chronische Strahlenfolgen – oft irreversibel." } },         { "id": "t1_q04", "type": "single", "stem": "Das Rückenmark soll bei einer Thoraxbestrahlung maximal 45 Gy erhalten. Überschreitet bereits ein kleines Teilvolumen diese Grenze, droht ein kompletter Funktionsverlust. Welche Klassifikation trifft zu?", "options": [ { "id": "a", "text": "Paralleles Risikoorgan – Teilbestrahlung wird toleriert." }, { "id": "b", "text": "Serielles Risikoorgan – Überschreitung der Toleranz an einer Stelle gefährdet die Gesamtfunktion.", "correct": true }, { "id": "c", "text": "Kritisches Organ – eine eigene Klasse ohne Bezug zu seriell/parallel." }, { "id": "d", "text": "Paralleles Risikoorgan, da das Rückenmark ein langer Strang ist." } ], "feedback": { "correct": "Richtig. Serielle Risikoorgane (Rückenmark, Sehnerv) verlieren bei Überschreitung der Toleranzdosis an einer Stelle ihre Gesamtfunktion – wie eine Kette, bei der ein Glied bricht.", "incorrect": "Nicht korrekt. Das Rückenmark ist das Musterbeispiel eines seriellen Risikoorgans. Myelopathie kann die Folge einer Überdosierung sein." } },         { "id": "t1_q05", "type": "single", "stem": "Ein Patient mit einem schnell wachsenden, hochmalignen Tumor soll bestrahlt werden. Welches Fraktionierungskonzept adressiert primär das Risiko der Tumorrepopulation?", "options": [ { "id": "a", "text": "Hypofraktionierung (z.B. 5×5 Gy) – weniger Sitzungen." }, { "id": "b", "text": "Normofraktionierung – immer der Standard." }, { "id": "c", "text": "Akzelerierte Bestrahlung – verkürzte Gesamtbehandlungszeit verhindert Tumorrepopulation.", "correct": true }, { "id": "d", "text": "Hyperfraktionierung allein – durch kleinere Einzeldosen wird das Normalgewebe geschont." } ], "feedback": { "correct": "Richtig. Die akzelerierte Bestrahlung verkürzt die Gesamtbehandlungszeit, um der Repopulation schnell proliferierender Tumorzellen entgegenzuwirken.", "incorrect": "Nicht korrekt. Schnell wachsende Tumoren erfordern eine verkürzte Gesamtbehandlungszeit. Die akzelerierte Bestrahlung adressiert genau dieses Problem." } },         { "id": "t1_q06", "type": "single", "stem": "Der Compton-Effekt dominiert in der Strahlentherapie. Ab welcher Photonenenergie wird die Paarbildung klinisch relevant?", "options": [ { "id": "a", "text": "Ab 1 MV" }, { "id": "b", "text": "Ab 6 MV" }, { "id": "c", "text": "Ab ca. 15 MV", "correct": true }, { "id": "d", "text": "Ab 50 MV" } ], "feedback": { "correct": "Richtig. Ab ca. 15 MV gewinnt die Paarbildung an Bedeutung. Dabei entstehen Positron-Elektron-Paare und fotoneuroneninduzierte Aktivierung – ein Grund, warum Energien >10 MV bei IMRT laut Strahlenschutzrichtlinie nicht zugelassen sind.", "incorrect": "Nicht korrekt. Der Compton-Effekt dominiert im therapeutischen Bereich (1–10 MV). Paarbildung wird erst ab ca. 15 MV relevant." } },         { "id": "t1_q07", "type": "single", "stem": "Ein Patient mit Rektumkarzinom kommt zur Lagerungssimulation. Welcher ist der primäre Zweck des Lochbretts (Bellyboard)?", "options": [ { "id": "a", "text": "Bessere Immobilisierung des Rückens." }, { "id": "b", "text": "Verlagerung des Dünndarms aus dem Bestrahlungsfeld durch die Bauchaussparung.", "correct": true }, { "id": "c", "text": "Erleichterung der CT-Bildgebung." }, { "id": "d", "text": "Verbesserung der Dosisverteilung durch Anhebung der Isodosen." } ], "feedback": { "correct": "Richtig. Das Lochbrett ermöglicht dem Dünndarm, durch die Aussparung nach ventral zu fallen – und damit aus dem Hochdosisbereich zu entweichen. Der Dünndarm hat eine TD 5/5 von 40 Gy und muss konsequent geschont werden.", "incorrect": "Nicht korrekt. Das Lochbrett dient der Dünndarmschonung. Der Darm fällt in die Aussparung und verlässt so das Bestrahlungsfeld." } },         { "id": "t1_q08", "type": "single", "stem": "Eine IMRT-Planung wird als 'inverse Planung' bezeichnet. Was bedeutet das?", "options": [ { "id": "a", "text": "Die Bestrahlungsfelder werden spiegelverkehrt eingestellt." }, { "id": "b", "text": "Der Planer gibt zuerst die gewünschte Dosisverteilung vor, das System berechnet dann die nötigen Feldparameter.", "correct": true }, { "id": "c", "text": "Die Gantry dreht sich in umgekehrter Richtung." }, { "id": "d", "text": "Die Planung beginnt mit den Risikoorganen statt mit dem Zielvolumen." } ], "feedback": { "correct": "Richtig. Bei der inversen Planung definiert der Planer das Dosisziel; der Algorithmus berechnet rückwärts die nötigen Feldgewichtungen und MLC-Positionen.", "incorrect": "Nicht korrekt. 'Invers' bedeutet: Von der gewünschten Dosisverteilung rückwärts zu den Feldparametern." } },         { "id": "t1_q09", "type": "single", "stem": "Welcher Tumormarker ist bei der Diagnostik und Verlaufskontrolle des Prostatakarzinoms unverzichtbar?", "options": [ { "id": "a", "text": "CEA" }, { "id": "b", "text": "CA 125" }, { "id": "c", "text": "PSA (Prostata-spezifisches Antigen)", "correct": true }, { "id": "d", "text": "AFP" } ], "feedback": { "correct": "Richtig. PSA ist der zentrale Marker beim Prostatakarzinom – für Diagnose, Therapiemonitoring und Nachsorge. Ein PSA-Anstieg nach Bestrahlung kann ein biochemisches Rezidiv anzeigen.", "incorrect": "Nicht korrekt. PSA ist der relevante Marker beim Prostatakarzinom. CEA → Kolon, CA 125 → Ovar, AFP → Leber." } },         { "id": "t1_q10", "type": "single", "stem": "Was ist das Isozentrum am Linearbeschleuniger?", "options": [ { "id": "a", "text": "Der Mittelpunkt des Strahlenkegels an der Hautoberfläche." }, { "id": "b", "text": "Der raumfeste Punkt, in dem sich Gantry-, Kollimator- und Tischachse schneiden.", "correct": true }, { "id": "c", "text": "Das geometrische Zentrum des Zielvolumens im Bestrahlungsplan." }, { "id": "d", "text": "Der Punkt maximaler Dosisablagerung im Gewebe." } ], "feedback": { "correct": "Richtig. Das Isozentrum ist der raumfeste Schnittpunkt der Rotationsachsen – typischerweise 100 cm vom Fokus entfernt (SAD = 100 cm).", "incorrect": "Nicht korrekt. Das Isozentrum ist der raumfeste Schnittpunkt der Rotationsachsen von Gantry, Kollimator und Tisch." } },         { "id": "t1_q11", "type": "single", "stem": "Ein 6-jähriges Kind mit Medulloblastom soll bestrahlt werden. Welche Bestrahlungstechnik ist indiziert?", "options": [ { "id": "a", "text": "Ganzhirnbestrahlung mit Gegenfeldtechnik" }, { "id": "b", "text": "Stereotaktische Einzeitbestrahlung (SRS)" }, { "id": "c", "text": "Kraniospinale Bestrahlung (Neuroachse)", "correct": true }, { "id": "d", "text": "IMRT auf den Primärtumor allein" } ], "feedback": { "correct": "Richtig. Medulloblastome metastasieren über den Liquorweg – die gesamte Neuroachse muss bestrahlt werden. Die wandernde Feldgrenze minimiert Hot Spots an den Feldanschlüssen.", "incorrect": "Nicht korrekt. Medulloblastome erfordern die Bestrahlung der gesamten Neuroachse wegen des Ausbreitungsmusters im Liquorraum." } },         { "id": "t1_q12", "type": "single", "stem": "Warum wird beim Mamma-Ca. nach brusterhaltender Operation ein Boost auf das Tumorbett appliziert?", "options": [ { "id": "a", "text": "Um die Gesamtdosis auf das gesunde Brustgewebe zu erhöhen." }, { "id": "b", "text": "Weil das Rückfallrisiko im Bereich des ehemaligen Tumorbetts am höchsten ist und dort eine Dosiseskalation erfolgt.", "correct": true }, { "id": "c", "text": "Weil die Zangentechnik das Tumorbett nicht erfasst." }, { "id": "d", "text": "Standardmäßig bei allen Brustkrebspatientinnen, unabhängig vom OP-Verfahren." } ], "feedback": { "correct": "Richtig. Das Tumorbett trägt das höchste Lokalrezidivrisiko. Nach Ganzbrust-RT (~50,4 Gy) wird das Tumorbett auf 60–66,4 Gy aufgesättigt. Beim SIB erfolgt dies simultan in einer Sitzung.", "incorrect": "Nicht korrekt. Der Boost zielt auf die Region mit dem höchsten Rezidivrisiko – das ehemalige Tumorbett." } },         { "id": "t1_q13", "type": "single", "stem": "Was versteht man unter dem Prinzip der 'wandernden Feldgrenze' bei der kraniospinalen Bestrahlung?", "options": [ { "id": "a", "text": "Die Gantry dreht sich während der Bestrahlung kontinuierlich." }, { "id": "b", "text": "Die Feldgrenzen werden täglich in 3 definierten Längen variiert, um Überdosierungen an den Feldanschlüssen zu vermeiden.", "correct": true }, { "id": "c", "text": "Der Bestrahlungstisch verschiebt sich während der Fraktion automatisch." }, { "id": "d", "text": "Die MLC-Positionen werden zwischen den Fraktionen angepasst." } ], "feedback": { "correct": "Richtig. Durch täglichen Wechsel der Feldlänge in drei Stufen werden Dosisinhomogenitäten an Feldübergängen über das Gewebe 'verwischt'.", "incorrect": "Nicht korrekt. Die wandernde Feldgrenze bezeichnet die tägliche Verschiebung der Feldanschlusslinie in drei alternierenden Längen." } },         { "id": "t1_q14", "type": "single", "stem": "Welchen Vorteil bietet die VMAT gegenüber der konventionellen Step-and-Shoot-IMRT?", "options": [ { "id": "a", "text": "VMAT verwendet höhere Energien und ist daher präziser." }, { "id": "b", "text": "Die Gantry rotiert kontinuierlich, was kürzere Behandlungszeiten und eine gleichmäßigere Dosisverteilung ermöglicht.", "correct": true }, { "id": "c", "text": "VMAT kommt ohne Multileaf-Kollimator aus." }, { "id": "d", "text": "VMAT erlaubt höhere Einzeldosen ohne zusätzliche Nebenwirkungen." } ], "feedback": { "correct": "Richtig. Bei VMAT rotiert die Gantry kontinuierlich bei simultaner MLC-Modulation. Vorteile: kürzere Behandlungszeit, gleichmäßigere Dosisverteilung, weniger integrale Dosis.", "incorrect": "Nicht korrekt. VMAT unterscheidet sich durch die kontinuierliche Gantryrotation mit simultaner MLC-Modulation." } },         { "id": "t1_q15", "type": "single", "stem": "Was ist das Ziel der präoperativen Bestrahlung beim Rektumkarzinom?", "options": [ { "id": "a", "text": "Heilung des Patienten ohne anschließende Operation." }, { "id": "b", "text": "Tumorverkleinerung (Downstaging) und Reduktion des Lokalrezidivrisikos.", "correct": true }, { "id": "c", "text": "Behandlung von Fernmetastasen." }, { "id": "d", "text": "Verbesserung der Lebensqualität ohne kuratives Ziel." } ], "feedback": { "correct": "Richtig. Ziele: Tumorverkleinerung zur Verbesserung der Resektabilität und Reduktion des Lokalrezidivrisikos. Zwei Konzepte: Kurzzeitbestrahlung 5×5 Gy oder Langzeit-RCT 1,8 Gy bis 50,4 Gy.", "incorrect": "Nicht korrekt. Die neoadjuvante Bestrahlung dient dem Downstaging und der Lokalrezidivreduktion – nicht dem Operationsersatz oder der Fernmetastasenbehandlung." } }       ]     },     {       "id": "tier2",       "label": "Stufe 2 – Multiple Select",       "description": "Mehrere Antworten möglich – alle Optionen einzeln bewerten",       "questions": [         { "id": "t2_q01", "type": "multi", "stem": "Welche Aussagen zu den Anforderungen an eine optimale Dosisverteilung sind korrekt?", "options": [ { "id": "a", "text": "Das Zielvolumen soll homogen durchstrahlt sein.", "correct": true }, { "id": "b", "text": "Am Rand des Zielvolumens soll ein steiler Dosisabfall erreicht werden.", "correct": true }, { "id": "c", "text": "Risikoorgane dürfen beliebig hoch dosiert werden, wenn das Zielvolumen ausreichend erfasst ist." }, { "id": "d", "text": "Die Toleranzdosen der Risikoorgane müssen eingehalten werden.", "correct": true }, { "id": "e", "text": "Dmax im PTV sollte laut ICRU ≤107% betragen.", "correct": true } ], "feedback": "a, b, d, e sind korrekt. Konformität, Homogenität, Risikoorganschonung und ICRU-konforme Dosisgrenzen sind die vier Säulen der Dosisverteilungsqualität. Option c ist falsch – Toleranzdosen sind verbindliche Grenzen." },         { "id": "t2_q02", "type": "multi", "stem": "Welche Aussagen zur therapeutischen Isodose sind korrekt?", "options": [ { "id": "a", "text": "Bei Photonenstrahlung sollte die 95%-Isodose (Dmin) das Zielvolumen umschließen.", "correct": true }, { "id": "b", "text": "Bei Elektronenstrahlung sollte die 80%-Isodose das Zielvolumen umschließen.", "correct": true }, { "id": "c", "text": "Die therapeutische Isodose entspricht immer der 100%-Isodose." }, { "id": "d", "text": "Isodosen verbinden Punkte gleicher Dosis in einer Ebene.", "correct": true }, { "id": "e", "text": "Die Wahl der therapeutischen Isodose ist unabhängig von der verwendeten Strahlenart." } ], "feedback": "a, b, d sind korrekt. Photonen: 95%-Isodose, Elektronen: 80%-Isodose. Die 100%-Isodose entspricht Dmax – nicht dem Planungsmindest-wert." },         { "id": "t2_q03", "type": "multi", "stem": "Welche Aussagen zum PTV (Planning Target Volume) sind korrekt?", "options": [ { "id": "a", "text": "Das PTV umschließt das CTV mit einem Sicherheitssaum.", "correct": true }, { "id": "b", "text": "Der Sicherheitssaum kompensiert Lagerungsungenauigkeiten und Organbewegungen.", "correct": true }, { "id": "c", "text": "Das PTV entspricht dem GTV plus einem fixen Saum von 5 mm." }, { "id": "d", "text": "Das PTV ist die Grundlage für die Bestrahlungsplanung.", "correct": true }, { "id": "e", "text": "Ein größeres PTV bedeutet immer eine bessere Tumorkontrolle." } ], "feedback": "a, b, d sind korrekt. PTV = CTV + Sicherheitssaum für geometrische Unsicherheiten. Der Saum ist nicht fix, sondern tumorspezifisch. Größeres PTV = mehr Normalgewebsbelastung." },         { "id": "t2_q04", "type": "multi", "stem": "Welche Aussagen zur IMRT-Technik sind korrekt?", "options": [ { "id": "a", "text": "Bei Step-and-Shot fährt die Gantry auf einen Winkel, die MLC fahren auf Position, dann wird bestrahlt.", "correct": true }, { "id": "b", "text": "Bei Sliding Window bewegen sich die Leafs dynamisch während der laufenden Bestrahlung.", "correct": true }, { "id": "c", "text": "Beide Techniken setzen inverse Bestrahlungsplanung voraus.", "correct": true }, { "id": "d", "text": "Step-and-Shot ist schneller als VMAT." }, { "id": "e", "text": "IMRT ermöglicht konkave Dosisverteilungen, die mit konventioneller 3D-RT nicht erreichbar sind.", "correct": true } ], "feedback": "a, b, c, e sind korrekt. Beide IMRT-Varianten nutzen inverse Planung und ermöglichen konkave Dosisverteilungen. Step-and-Shot ist in der Regel langsamer als VMAT." },         { "id": "t2_q05", "type": "multi", "stem": "Welche der folgenden Organe sind serielle Risikoorgane?", "options": [ { "id": "a", "text": "Rückenmark", "correct": true }, { "id": "b", "text": "Sehnerv", "correct": true }, { "id": "c", "text": "Lunge" }, { "id": "d", "text": "Ösophagus", "correct": true }, { "id": "e", "text": "Leber" } ], "feedback": "a, b, d sind korrekt. Rückenmark, Sehnerv/Chiasma und Ösophagus sind serielle Organe – ein Teilschaden kann die Gesamtfunktion aufheben. Lunge und Leber sind parallele Organe." },         { "id": "t2_q06", "type": "multi", "stem": "Welche Hilfsmittel dienen der Anpassung der Dosisverteilung?", "options": [ { "id": "a", "text": "Keilfilter – gleicht Körperinhomogenitäten aus und neigt die Isodosen.", "correct": true }, { "id": "b", "text": "Moulage/Bolus – verschiebt das Dosismaximum an die Hautoberfläche.", "correct": true }, { "id": "c", "text": "Flattening Filter – homogenisiert das Strahlenfeld.", "correct": true }, { "id": "d", "text": "Knierolle – verbessert die Dosisverteilung durch Tumorverkleinerung." }, { "id": "e", "text": "MLC – formt das Bestrahlungsfeld an die Zielvolumenkontur an.", "correct": true } ], "feedback": "a, b, c, e sind korrekt. Keilfilter, Bolus, Flattening Filter und MLC sind dosimetrisch wirksam. Die Knierolle ist eine Lagerungshilfe ohne direkten Einfluss auf die Dosisverteilung." },         { "id": "t2_q07", "type": "multi", "stem": "Welche Aussagen zum DVH (Dosis-Volumen-Histogramm) sind korrekt?", "options": [ { "id": "a", "text": "Ein ideales DVH für das Zielvolumen zeigt einen steilen Anstieg bei der Verschreibungsdosis.", "correct": true }, { "id": "b", "text": "Ein optimales DVH für ein Risikoorgan zeigt einen frühen Abfall.", "correct": true }, { "id": "c", "text": "Das DVH zeigt die dreidimensionale Dosisverteilung im Körper direkt." }, { "id": "d", "text": "Aus dem DVH lässt sich die Toleranzdosisüberschreitung eines Risikoorgans ablesen.", "correct": true }, { "id": "e", "text": "Ein schlechtes DVH für das Zielvolumen zeigt, dass das ZV die Verschreibungsdosis nicht vollständig erhält.", "correct": true } ], "feedback": "a, b, d, e sind korrekt. Das DVH trägt Volumen gegen Dosis auf – keine 3D-Darstellung. Es erlaubt schnelle Beurteilung von Zielvolumenerfassung und Risikoorganschonung." },         { "id": "t2_q08", "type": "multi", "stem": "Welche Fraktionierungskonzepte weichen von der Normofraktionierung ab?", "options": [ { "id": "a", "text": "Hypofraktionierung: höhere Einzeldosis (>2 Gy), weniger Fraktionen.", "correct": true }, { "id": "b", "text": "Hyperfraktionierung: kleinere Einzeldosis (<1,8 Gy), 2× täglich.", "correct": true }, { "id": "c", "text": "Akzelerierte Bestrahlung: verkürzte Gesamtbehandlungszeit.", "correct": true }, { "id": "d", "text": "SBRT: sehr hohe Einzeldosen (5–20 Gy), wenige Fraktionen.", "correct": true }, { "id": "e", "text": "Simultaner Integrierter Boost (SIB): entspricht einer einfachen Normofraktionierung." } ], "feedback": "a, b, c, d sind korrekt. SIB ist eine Form der differenzierten Dosisverteilung innerhalb einer Fraktion – verschiedene Zielvolumina erhalten unterschiedliche Dosen pro Sitzung, was per Definition von einfacher Normofraktionierung abweicht." },         { "id": "t2_q09", "type": "multi", "stem": "Welche Aussagen zu akuten Strahlenfolgen sind korrekt?", "options": [ { "id": "a", "text": "Akute Strahlenfolgen treten bis zum 90. Tag nach Bestrahlungsbeginn auf.", "correct": true }, { "id": "b", "text": "Sie sind häufig reversibel.", "correct": true }, { "id": "c", "text": "Sie betreffen vor allem Gewebe mit schneller Zellteilung (Haut, Schleimhaut, Knochenmark).", "correct": true }, { "id": "d", "text": "Sie sind immer bleibend und nicht behandelbar." }, { "id": "e", "text": "Verlängerung der Gesamtbehandlungszeit kann akute Nebenwirkungen reduzieren.", "correct": true } ], "feedback": "a, b, c, e sind korrekt. Akute Strahlenfolgen betreffen proliferierende Gewebe und sind oft reversibel. Verlängerung der Behandlungszeit gibt Geweben mehr Zeit zur Regeneration." },         { "id": "t2_q10", "type": "multi", "stem": "Welche Aussagen zur Großfeldtechnik sind korrekt?", "options": [ { "id": "a", "text": "Ganzkörperbestrahlung (GKB) ist eine Anwendung der Großfeldtechnik.", "correct": true }, { "id": "b", "text": "Kraniospinale Bestrahlung der Neuroachse ist eine Anwendung der Großfeldtechnik.", "correct": true }, { "id": "c", "text": "Mantelfeldbestrahlung ist eine Anwendung der Großfeldtechnik.", "correct": true }, { "id": "d", "text": "Großfeldtechniken erfordern keine besonderen Maßnahmen an den Feldanschlüssen." }, { "id": "e", "text": "Hot Spots an Feldanschlüssen sind ein typisches Problem bei Großfeldtechniken.", "correct": true } ], "feedback": "a, b, c, e sind korrekt. Großfeldtechniken überschreiten die maximale Feldgröße eines einzelnen Isozentrums und erfordern Feldanschlüsse – kritische Bereiche für Hot/Cold Spots." },         { "id": "t2_q11", "type": "multi", "stem": "Welche Aussagen zur Wanderwellenbeschleunigung im Linearbeschleuniger sind korrekt?", "options": [ { "id": "a", "text": "Am Eingang des Beschleunigungsrohres wird eine Hochfrequenzwelle eingespeist.", "correct": true }, { "id": "b", "text": "Am Ende des Rohres werden die Wellen im 'Sumpf' absorbiert – nicht reflektiert.", "correct": true }, { "id": "c", "text": "Die Elektronen 'surfen' auf der Wanderwelle und werden so beschleunigt.", "correct": true }, { "id": "d", "text": "Die Stehwellenbeschleunigung nutzt das Prinzip der Wellenreflexion.", "correct": true }, { "id": "e", "text": "Die Wanderwellenbeschleunigung benötigt kein Vakuum." } ], "feedback": "a, b, c, d sind korrekt. Wanderwelle: Welle wird am Ende absorbiert. Stehwelle: hin- und rücklaufende Wellen überlagern sich. Vakuum ist bei beiden zwingend erforderlich (e ist falsch)." },         { "id": "t2_q12", "type": "multi", "stem": "Welche der folgenden Organe gelten als parallele Risikoorgane?", "options": [ { "id": "a", "text": "Lunge", "correct": true }, { "id": "b", "text": "Leber", "correct": true }, { "id": "c", "text": "Rückenmark" }, { "id": "d", "text": "Haut", "correct": true }, { "id": "e", "text": "Sehnerv" } ], "feedback": "a, b, d sind korrekt. Lunge, Leber und Haut sind parallele Organe. Rückenmark und Sehnerv sind klassische serielle Organe." },         { "id": "t2_q13", "type": "multi", "stem": "Welche Aussagen zur Toleranzdosis (TD 5/5) sind korrekt?", "options": [ { "id": "a", "text": "TD 5/5 gibt die Dosis an, bei der 5% der Patienten in 5 Jahren eine Nebenwirkung entwickeln.", "correct": true }, { "id": "b", "text": "TD 50/5 gibt die Dosis an, bei der 50% der Patienten in 5 Jahren eine Nebenwirkung entwickeln.", "correct": true }, { "id": "c", "text": "Die TD 5/5 für das Rückenmark beträgt ca. 40–45 Gy.", "correct": true }, { "id": "d", "text": "Die TD 5/5 für die Linse ist besonders niedrig (4–6 Gy → Katarakt).", "correct": true }, { "id": "e", "text": "Toleranzdosen sind für alle Organe identisch." } ], "feedback": "a, b, c, d sind korrekt. Toleranzdosen sind organspezifisch und variieren erheblich: Linse 4–6 Gy, Rückenmark 40–45 Gy, Rektum 60 Gy. Diese Unterschiede bestimmen die Planungsoptimierung." },         { "id": "t2_q14", "type": "multi", "stem": "Welche Vorteile bietet VMAT gegenüber der 3D-konformalen Bestrahlung?", "options": [ { "id": "a", "text": "Bessere Konformität der Dosisverteilung.", "correct": true }, { "id": "b", "text": "Bessere Schonung der Risikoorgane.", "correct": true }, { "id": "c", "text": "Kürzere Behandlungszeit durch kontinuierliche Gantryrotation.", "correct": true }, { "id": "d", "text": "Vollständiger Verzicht auf bildgestützte Verifikation (IGRT)." }, { "id": "e", "text": "Ermöglicht den simultanen integrierten Boost (SIB).", "correct": true } ], "feedback": "a, b, c, e sind korrekt. IGRT ist bei VMAT wegen steiler Dosisgradienten besonders wichtig – nicht verzichtbar (d ist falsch)." },         { "id": "t2_q15", "type": "multi", "stem": "Welche akuten Nebenwirkungen sind typisch bei der Bestrahlung von HNO-Tumoren?", "options": [ { "id": "a", "text": "Mukositis", "correct": true }, { "id": "b", "text": "Xerostomie (Mundtrockenheit)", "correct": true }, { "id": "c", "text": "Geschmacksverlust", "correct": true }, { "id": "d", "text": "Radiodermatitis im Bestrahlungsfeld", "correct": true }, { "id": "e", "text": "Harninkontinenz" } ], "feedback": "a, b, c, d sind korrekt. Harninkontinenz ist eine typische Becken-Nebenwirkung (Prostata, Rektum), nicht typisch bei HNO-Bestrahlungen." }       ]     },     {       "id": "tier3",       "label": "Stufe 3 – Fallkette",       "description": "Aufeinander aufbauende Entscheidungen an einem Patientenfall",       "case_context": "Herr K., 62 Jahre, Rektumkarzinom (cT3 N1 M0). Geplant ist eine neoadjuvante Radiochemotherapie (1,8 Gy bis 50,4 Gy, Capecitabin), gefolgt von Operation nach 6–8 Wochen.",       "questions": [         { "id": "t3_q01", "type": "single", "stem": "Herr K. kommt zur Lagerungssimulation. Welche Lagerung ist korrekt?", "options": [ { "id": "a", "text": "Rückenlage, Knierolle, Arme auf der Brust" }, { "id": "b", "text": "Bauchlage, Lochbrett (Bellyboard), Knierolle unter die Füße, Arme nach vorne", "correct": true }, { "id": "c", "text": "Rückenlage, Bluebag, Knierolle" }, { "id": "d", "text": "Bauchlage, Vakuumkissen, Armstütze seitlich" } ], "feedback": { "correct": "Richtig. Standard beim Rektumkarzinom: Bauchlage auf dem Lochbrett. Der Dünndarm fällt in die Aussparung – er verlässt den Hochdosisbereich.", "incorrect": "Nicht korrekt. Beim Rektumkarzinom ist Bauchlage auf dem Lochbrett Standard – zur Dünndarmschonung." } },         { "id": "t3_q02", "type": "multi", "stem": "Welche Risikoorgane befinden sich typischerweise im Bestrahlungsgebiet beim Rektumkarzinom?", "options": [ { "id": "a", "text": "Dünndarm", "correct": true }, { "id": "b", "text": "Harnblase", "correct": true }, { "id": "c", "text": "Prostata / innere weibliche Geschlechtsorgane", "correct": true }, { "id": "d", "text": "Hüftköpfe (Femurkopf beidseits)", "correct": true }, { "id": "e", "text": "Lunge" } ], "feedback": "a, b, c, d sind korrekt. Im Becken liegen Dünndarm, Blase, Prostata/Uterus und Femurkopfköpfe im typischen Dosisbereich. Die Lunge liegt anatomisch weit entfernt." },         { "id": "t3_q03", "type": "single", "stem": "Das DVH zeigt: 35% des Blasenvolumens erhalten >50 Gy. Die TD 5/5 der Blase beträgt 65 Gy. Was ist die korrekte Einschätzung?", "options": [ { "id": "a", "text": "Unbedenklich – 65 Gy TD 5/5 wird nicht überschritten." }, { "id": "b", "text": "Kritisch prüfen – dieser Befund muss mit dem Planungsteam besprochen werden.", "correct": true }, { "id": "c", "text": "Der Plan muss sofort gestoppt werden – jede Blasendosis über 40 Gy ist unzulässig." }, { "id": "d", "text": "Das DVH ist für Risikoorgane bei Beckenbestrahlungen irrelevant." } ], "feedback": { "correct": "Richtig. 35% Blasenvolumen bei >50 Gy ist ein relevanter Befund. Keine automatische Ablehnung, aber Dokumentation und Rücksprache mit Radioonkologe/MPE sind zwingend.", "incorrect": "Nicht korrekt. Dieser DVH-Befund ist planungsrelevant und erfordert Diskussion im Planungsteam – keinen sofortigen Abbruch, aber auch kein unkritisches Akzeptieren." } },         { "id": "t3_q04", "type": "single", "stem": "Herr K. fragt dich in der 3. Fraktion nach seiner Müdigkeit und dem leichten Durchfall. Was ist die korrekte Reaktion?", "options": [ { "id": "a", "text": "Diese Symptome sind ungewöhnlich und müssen sofort ärztlich abgeklärt werden." }, { "id": "b", "text": "Du bestätigst, dass dies typische akute Strahlenfolgen bei Beckenbestrahlungen sind, und empfiehlst, die Symptome dem behandelnden Arzt zu schildern.", "correct": true }, { "id": "c", "text": "Du verweist ihn ausschließlich an die Pflege und machst keine eigene Aussage." }, { "id": "d", "text": "Du versicherst, dass die Symptome vollständig verschwinden werden." } ], "feedback": { "correct": "Richtig. Fatigue und Diarrhö sind typische akute Strahlenfolgen bei Beckenbestrahlungen. Als MTR informierst du den Patienten sachlich – mit Verweis auf den Arzt für vertiefte medizinische Einschätzungen. Keine prognostischen Aussagen über vollständige Erholung.", "incorrect": "Nicht korrekt. Fatigue und leichte Diarrhö sind bei Beckenbestrahlungen gut bekannte akute Strahlenfolgen. Sachliche Information des Patienten gehört zur MTR-Rolle – natürlich mit Verweis auf den behandelnden Arzt." } },         { "id": "t3_q05", "type": "single", "stem": "Beim Setup-CBCT zeigt sich eine Abweichung von 8 mm in PA-Richtung. Was ist korrekt?", "options": [ { "id": "a", "text": "Vernachlässigbar – unter 1 cm ist immer akzeptabel." }, { "id": "b", "text": "Sofortiger Abbruch und Neuplanung." }, { "id": "c", "text": "Tischkorrektur gemäß Protokoll, ggf. Verifikations-CBCT, Dokumentation, bei Systematik Rücksprache.", "correct": true }, { "id": "d", "text": "Bestrahlung trotzdem – CBCT ist nur zur Dokumentation." } ], "feedback": { "correct": "Richtig. 8 mm überschreitet den typischen Action Level (3–5 mm). Korrekte Reaktion: Tischkorrektur, Verifikations-CBCT, Dokumentation. Bei systemischen Abweichungen Rücksprache mit Arzt/MPE – möglicherweise ist Replanning nötig.", "incorrect": "Nicht korrekt. 8 mm ist klinisch relevant. Tischkorrektur und Verifikation sind bei Überschreitung des Action Levels Pflicht." } },         { "id": "t3_q06", "type": "single", "stem": "Beim Setup von Herrn K. stimmt der Tätowierungspunkt nicht mit dem Laserkreuz überein. Was ist die korrekte Reaktion?", "options": [ { "id": "a", "text": "Bestrahlung trotzdem – kleine Abweichungen sind tolerierbar." }, { "id": "b", "text": "Setup nicht akzeptieren – Ursache klären, ggf. CBCT, Dokumentation.", "correct": true }, { "id": "c", "text": "Den Patienten fragen, ob er sich korrekt gelagert hat." }, { "id": "d", "text": "Den Marker neu setzen und fortfahren." } ], "feedback": { "correct": "Richtig. Eine Abweichung zwischen Marker und Laser ist ein Setup-Fehler mit potenziell erheblicher dosimetrischer Konsequenz. Korrekte Reaktion: Setup nicht akzeptieren, systematisch klären (falscher Patient? Lagerungsfehler?), CBCT, Dokumentation.", "incorrect": "Nicht korrekt. Jede unklare Abweichung zwischen Marker und Laser muss systematisch geklärt werden, bevor bestrahlt wird." } },         { "id": "t3_q07", "type": "single", "stem": "Was bedeutet das ALARA-Prinzip im Kontext der Strahlentherapie?", "options": [ { "id": "a", "text": "Patienten erhalten die maximal mögliche Dosis für optimale Tumorkontrolle." }, { "id": "b", "text": "Die Strahlenexposition für Personal und Patienten soll so niedrig wie vernünftigerweise erreichbar gehalten werden.", "correct": true }, { "id": "c", "text": "ALARA gilt ausschließlich im diagnostischen Strahlenschutz." }, { "id": "d", "text": "Alle Bestrahlungen müssen von zwei MTR gleichzeitig durchgeführt werden." } ], "feedback": { "correct": "Richtig. ALARA (As Low As Reasonably Achievable) gilt sowohl für Diagnostik als auch Therapie – für Risikoorganschonung im Plan, für Personalschutz durch Abstand und Abschirmung.", "incorrect": "Nicht korrekt. ALARA gilt in Diagnostik UND Therapie – für Personal und für Patienten (Normalgewebsschonung)." } },         { "id": "t3_q08", "type": "single", "stem": "Ein Patient erhält palliative Bestrahlung einer Wirbelkörpermetastase (3×8 Gy). Was ist das primäre Therapieziel?", "options": [ { "id": "a", "text": "Heilung durch vollständige Tumoreradikation." }, { "id": "b", "text": "Schmerzlinderung, Verhinderung pathologischer Frakturen, Verbesserung der Lebensqualität.", "correct": true }, { "id": "c", "text": "Verlängerung des Gesamtüberlebens um mehrere Jahre." }, { "id": "d", "text": "Vorbereitung auf anschließende kurative Systemtherapie." } ], "feedback": { "correct": "Richtig. Bei palliativer Indikation steht Symptomkontrolle im Vordergrund. Hypofraktionierte Konzepte sind effektiv und patientenfreundlich.", "incorrect": "Nicht korrekt. Palliative Bestrahlung hat Symptomkontrolle als Ziel, nicht Kuration." } },         { "id": "t3_q09", "type": "single", "stem": "Worin unterscheiden sich GTV und CTV grundlegend?", "options": [ { "id": "a", "text": "GTV und CTV sind identisch." }, { "id": "b", "text": "Das GTV umfasst den bildgebend nachweisbaren Tumor, das CTV erweitert diesen um subklinische Ausbreitungsgebiete.", "correct": true }, { "id": "c", "text": "Das CTV ist immer kleiner als das GTV." }, { "id": "d", "text": "Das GTV wird vom MTR, das CTV vom Physiker definiert." } ], "feedback": { "correct": "Richtig. GTV = makroskopischer Tumor. CTV = GTV + Sicherheitssaum für mikroskopische Ausbreitung + Lymphabflussregionen. CTV ist immer >= GTV. Konturierung erfolgt durch den Radioonkologen.", "incorrect": "Nicht korrekt. CTV ist die klinische Erweiterung des GTV. Es ist niemals kleiner als das GTV." } },         { "id": "t3_q10", "type": "single", "stem": "Was ist der Simultane Integrierte Boost (SIB)?", "options": [ { "id": "a", "text": "Der Boost wird nach Abschluss der Grundfeldbestrahlung separat appliziert." }, { "id": "b", "text": "Boost-Volumen und Grundfeld erhalten simultan unterschiedliche Dosen pro Fraktion in derselben Sitzung.", "correct": true }, { "id": "c", "text": "SIB ist nur bei Mamma-Ca. anwendbar." }, { "id": "d", "text": "SIB verlängert die Behandlungszeit erheblich." } ], "feedback": { "correct": "Richtig. Beim SIB werden verschiedene Zielvolumina simultan in einer Fraktion mit unterschiedlichen Dosen bestrahlt (Dose-Painting). Vorteil: kürzere Gesamtbehandlungszeit. Etabliert bei Mamma-Ca., HNO-Tumoren, Prostata.", "incorrect": "Nicht korrekt. SIB bedeutet simultane Applikation unterschiedlicher Dosen auf verschiedene Zielvolumina in einer Sitzung – nicht sequenziell." } },         { "id": "t3_q11", "type": "single", "stem": "Herr K. hat starken Gewichtsverlust (8 kg in 4 Wochen) während der Radiochemotherapie. Welche Konsequenz kann das haben?", "options": [ { "id": "a", "text": "Keine – der Bestrahlungsplan ist einmal erstellt und unveränderbar." }, { "id": "b", "text": "Die Anatomie verändert sich; der Plan verliert möglicherweise seine Gültigkeit und ein Adaptive Replanning kann nötig sein.", "correct": true }, { "id": "c", "text": "Nur für die Lagerungshilfen relevant, nicht für die Dosisverteilung." }, { "id": "d", "text": "Gewichtsverlust verbessert die Dosisverteilung automatisch." } ], "feedback": { "correct": "Richtig. Signifikanter Gewichtsverlust verändert die Körperkonturen und damit die Dosisverteilung. Der ursprüngliche Plan kann nicht mehr die geplante Dosisabdeckung gewährleisten. Bei >5% Gewichtsverlust oder sichtbarer Konturänderung ist Rücksprache mit dem Planungsteam und ggf. Adaptive Replanning indiziert.", "incorrect": "Nicht korrekt. Gewichtsveränderungen beeinflussen die Körperkonturen und damit die Dosisverteilung erheblich. Adaptive Replanning kann notwendig werden." } },         { "id": "t3_q12", "type": "single", "stem": "Für einen Patienten mit Ösophaguskarzinom (mittleres Drittel) ist eine IMRT geplant. Welches serielle Risikoorgan muss prioritär geschützt werden?", "options": [ { "id": "a", "text": "Harnblase (TD 5/5: 65 Gy)" }, { "id": "b", "text": "Lunge (TD 5/5: 23 Gy)" }, { "id": "c", "text": "Rückenmark (TD 5/5: 40–45 Gy → Myelopathie)", "correct": true }, { "id": "d", "text": "Hüftgelenk (TD 5/5: 52 Gy)" } ], "feedback": { "correct": "Richtig. Das Rückenmark ist das kritischste serielle Risikoorgan bei der Ösophagusbestrahlung. Eine Myelopathie nach Überschreitung der Toleranzdosis wäre eine schwerwiegende, irreversible Spätfolge. Die maximale Rückenmarkdosis wird im Plan streng überwacht.", "incorrect": "Nicht korrekt. Das Rückenmark (TD 5/5: 40–45 Gy → Myelopathie) ist das prioritäre serielle Risikoorgan bei der Ösophagusbestrahlung. Harnblase und Hüftgelenk sind bei Thoraxbestrahlungen nicht im Fokus." } },         { "id": "t3_q13", "type": "single", "stem": "Ein Patient mit HNO-Tumor erhält eine IMRT-Bestrahlung. Wofür dient die Thermoplastmaske?", "options": [ { "id": "a", "text": "Strahlenschutz für den Patienten." }, { "id": "b", "text": "Reproduzierbare Immobilisierung des Kopfes zur Sicherstellung der Lagerungsgenauigkeit.", "correct": true }, { "id": "c", "text": "Dosisaufbau an der Hautoberfläche." }, { "id": "d", "text": "Kennzeichnung des Zielvolumens auf der Haut." } ], "feedback": { "correct": "Richtig. Die Thermoplastmaske fixiert Kopf und Hals reproduzierbar. Bei HNO-IMRT mit engen Sicherheitssäumen ist die Lagerungsgenauigkeit von <3 mm entscheidend.", "incorrect": "Nicht korrekt. Die Thermoplastmaske dient der Immobilisierung und Reproduzierbarkeit – nicht dem Strahlenschutz oder der Dosismodifikation." } },         { "id": "t3_q14", "type": "multi", "stem": "Welche Aussagen zum Normofraktionierungskonzept beim Rektumkarzinom (Langzeit-RCT) sind korrekt?", "options": [ { "id": "a", "text": "Einzeldosis 1,8 Gy, Gesamtdosis 50,4 Gy.", "correct": true }, { "id": "b", "text": "Capecitabin wird als Radiosensitizer begleitend gegeben.", "correct": true }, { "id": "c", "text": "Die Operation erfolgt unmittelbar am Tag nach der letzten Fraktion." }, { "id": "d", "text": "Operation nach 6–8 Wochen nach Ende der Radiochemotherapie.", "correct": true }, { "id": "e", "text": "Ziel ist die Tumorkleinerung (Downstaging) vor der chirurgischen Resektion.", "correct": true } ], "feedback": "a, b, d, e sind korrekt. Das Intervall von 6–8 Wochen ist wichtig – es gibt dem Tumor Zeit zur Regression (Downstaging) und dem Normalgewebe zur Erholung vor der Operation." },         { "id": "t3_q15", "type": "single", "stem": "Herr K. hat während der Therapie anhaltende Übelkeit. Wie verhältst du dich als MTR?", "options": [ { "id": "a", "text": "Du empfiehlst ihm, die Bestrahlung zu unterbrechen." }, { "id": "b", "text": "Du dokumentierst das Symptom, informierst den zuständigen Arzt und gibst dem Patienten Raum, sich zu äußern.", "correct": true }, { "id": "c", "text": "Du verschreibst ein Antiemetikum." }, { "id": "d", "text": "Du sagst, dass Übelkeit bei Beckenbestrahlungen nicht typisch ist." } ], "feedback": { "correct": "Richtig. Als MTR dokumentierst du Symptome, informierst den Arzt (du diagnostizierst nicht, du medizierschst nicht) und kommunizierst empathisch mit dem Patienten. Übelkeit ist eine bekannte akute Nebenwirkung bei Beckenbestrahlungen (Dünndarmirrritation, Capecitabin-Effekt). Entscheidungen über Therapiepausen oder Medikamente trifft der Arzt.", "incorrect": "Nicht korrekt. MTR-Rolle: Symptome dokumentieren, Arzt informieren, Patienten empathisch begleiten. Medizinische Entscheidungen (Pause, Medikamente) trifft der Arzt." } }       ]     }   ] };  const TRANSFER = {   title: "Transferaufgabe: Dosimetrische Entscheidung",   case: "Beim Planungs-CT von Herrn K. (Rektumkarzinom, neoadjuvante RCT, 1,8 Gy bis 50,4 Gy) zeigt das DVH: Das Dünndarm-Volumen erhält zu 28% eine Dosis von über 40 Gy. Die TD 5/5 für den Dünndarm beträgt 40 Gy (Stenose/Perforation als Spätfolge).",   question: "Was bedeutet dieser Befund klinisch? Welche Konsequenz hat er für die Behandlung? Wie verhältst du dich als MTR? Berücksichtige die Rollenabgrenzung im interprofessionellen Team.",   sample: "Das DVH zeigt, dass 28% des Dünndarmvolumens eine Dosis an oder über der TD 5/5 von 40 Gy erhält – ein relevantes Risiko für späte Dünndarmschädigung (Stenose, Ileus, Perforation). Als MTR: Befund dokumentieren, Radioonkologe und MPE informieren. Entscheidung über Planakzeptanz trifft der Radioonkologe. Mögliche Maßnahmen: Lagerungsoptimierung (Bellyboard korrekt?), Planoptimierung (VMAT?), ggf. Zielvolumenreduktion. Handeln nach ALARA-Prinzip und Vier-Augen-Prinzip.",   checklist: [     "Ich habe die klinische Bedeutung erklärt (TD 5/5 Dünndarm = 40 Gy, mögliche Spätfolgen).",     "Ich habe eine konkrete Handlungskonsequenz formuliert (Dokumentation, Rücksprache, ggf. Replanning).",     "Ich habe die Rollenabgrenzung MTR / Radioonkologe / MPE korrekt beschrieben.",     "Ich habe das ALARA-Prinzip oder Strahlenschutzprinzipien erwähnt.",     "Ich habe das Lagerungsprinzip (Bellyboard) als Dünndarmschutzmaßnahme einbezogen."   ] };  const app = document.getElementById('app');  const state = {   questions: [],   currentIndex: 0,   answers: {},   submitted: {},   score: 0,   startTime: Date.now() };  function shuffle(arr) {   for (let i = arr.length - 1; i > 0; i--) {     const j = Math.floor(Math.random() * (i + 1));     [arr[i], arr[j]] = [arr[j], arr[i]];   } }  function drawFromPool() {   const drawn = [];   const perTier = MODULE.draw_per_tier || 5;   for (const tier of MODULE.tiers) {     const pool = [...tier.questions];     shuffle(pool);     const selected = pool.slice(0, Math.min(perTier, pool.length));     selected.forEach(q => {       q._tierLabel = tier.label;       q._tierDesc = tier.description;       q._caseContext = tier.case_context || null;     });     drawn.push(...selected);   }   return drawn; }  function init() {   state.questions = drawFromPool();   state.currentIndex = 0;   state.answers = {};   state.submitted = {};   state.score = 0;   state.startTime = Date.now();   renderIntro(); }  function renderIntro() {   const totalPool = MODULE.tiers.reduce((s, t) => s + t.questions.length, 0);   app.innerHTML = `     <div class="quiz-intro">       <div class="quiz-intro__badge">Prüfungstraining MTR</div>       <h1 class="quiz-intro__title">${MODULE.title}</h1>       <p class="quiz-intro__subtitle">${MODULE.subtitle}</p>       <p class="quiz-intro__desc">${MODULE.description}</p>       <div class="quiz-intro__meta">         <span>📋 ${MODULE.draw_count} Fragen</span>         <span>⏱ ca. ${MODULE.estimated_minutes} Minuten</span>         <span>🔀 Zufällige Auswahl aus ${totalPool} Fragen</span>       </div>       <div class="quiz-intro__tiers">         ${MODULE.tiers.map(t => `           <div class="quiz-tier-pill">             <strong>${t.label}</strong>             <span>${t.description}</span>           </div>         `).join('')}       </div>       <button class="btn btn--primary btn--lg" id="start-btn">Quiz starten →</button>     </div>   `;   document.getElementById('start-btn').addEventListener('click', () => renderQuestion()); }  function renderQuestion() {   const q = state.questions[state.currentIndex];   const total = state.questions.length;   const progress = Math.round((state.currentIndex / total) * 100);   const locked = !!state.submitted[q.id];    const caseHtml = q._caseContext     ? `<div class="quiz-case-context"><span class="quiz-case-badge">Fallkontext</span><p>${q._caseContext}</p></div>`     : '';    app.innerHTML = `     <div class="quiz-wrapper">       <div class="quiz-progress">         <div class="quiz-progress__bar"><div class="quiz-progress__fill" style="width:${progress}%"></div></div>         <span class="quiz-progress__label">Frage ${state.currentIndex + 1} von ${total}</span>       </div>       <div class="quiz-tier-label">         <span class="quiz-tier-badge">${q._tierLabel || ''}</span>         <span class="quiz-tier-desc">${q._tierDesc || ''}</span>       </div>       ${caseHtml}       <div class="quiz-question">         <p class="quiz-question__stem">${q.stem}</p>         ${q.type === 'multi' ? '<p class="quiz-question__hint">Mehrere Antworten möglich – alle Optionen einzeln bewerten.</p>' : ''}       </div>       <div class="quiz-options" id="quiz-options">         ${renderOptions(q, locked)}       </div>       ${locked ? renderFeedback(q) : ''}       <div class="quiz-actions">         ${!locked           ? '<button class="btn btn--primary" id="submit-btn" disabled>Antwort prüfen</button>'           : state.currentIndex < total - 1             ? '<button class="btn btn--primary" id="next-btn">Nächste Frage →</button>'             : '<button class="btn btn--primary" id="finish-btn">Auswertung →</button>'         }       </div>     </div>   `;    const optionsEl = document.getElementById('quiz-options');   const submitBtn = document.getElementById('submit-btn');    if (!locked && optionsEl) {     optionsEl.addEventListener('change', () => {       const checked = [...optionsEl.querySelectorAll('input:checked')].map(i => i.value);       state.answers[q.id] = checked;       if (submitBtn) submitBtn.disabled = checked.length === 0;     });   }    document.getElementById('submit-btn')?.addEventListener('click', () => submitAnswer(q));   document.getElementById('next-btn')?.addEventListener('click', () => { state.currentIndex++; renderQuestion(); });   document.getElementById('finish-btn')?.addEventListener('click', () => renderResult()); }  function renderOptions(q, locked) {   const selected = state.answers[q.id] || [];   const sub = state.submitted[q.id];    return q.options.map(opt => {     const isSel = selected.includes(opt.id);     let cls = '';     if (locked && sub) {       if (q.type === 'single') {         if (opt.correct) cls = 'quiz-option--correct';         else if (isSel && !opt.correct) cls = 'quiz-option--wrong';       } else {         if (opt.correct && isSel) cls = 'quiz-option--correct';         else if (opt.correct && !isSel) cls = 'quiz-option--missed';         else if (!opt.correct && isSel) cls = 'quiz-option--wrong';       }     } else if (isSel) cls = 'quiz-option--selected';      const icon = locked ? (cls === 'quiz-option--correct' ? '✓' : cls === 'quiz-option--wrong' ? '✗' : cls === 'quiz-option--missed' ? '○' : '') : '';      return '<label class="quiz-option ' + cls + ' ' + (locked ? 'quiz-option--locked' : '') + '" data-id="' + opt.id + '"><span class="quiz-option__indicator"><input type="' + (q.type === 'multi' ? 'checkbox' : 'radio') + '" name="q_' + q.id + '" value="' + opt.id + '" ' + (isSel ? 'checked' : '') + ' ' + (locked ? 'disabled' : '') + '></span><span class="quiz-option__text">' + opt.text + '</span>' + (icon ? '<span class="quiz-option__icon">' + icon + '</span>' : '') + '</label>';   }).join(''); }  function renderFeedback(q) {   const sub = state.submitted[q.id];   const isCorrect = sub?.correct;   const rawText = typeof q.feedback === 'string' ? q.feedback : (isCorrect ? q.feedback?.correct : q.feedback?.incorrect) || '';   const cls = isCorrect ? 'quiz-feedback--correct' : 'quiz-feedback--incorrect';   const label = isCorrect ? 'Richtig' : 'Nicht vollständig korrekt';   const toggleColor = isCorrect ? 'var(--color-correct)' : 'var(--color-wrong)';   const parts = rawText.split(/(?<=\.) /);   const summary = parts[0] || rawText;   const detail = parts.slice(1).join(' ');   const detailBlock = detail     ? '<div class="quiz-feedback__detail hidden" id="qfd-' + q.id + '"><p class="quiz-feedback__text" style="margin-top:8px;">' + detail + '</p></div><button class="feedback-toggle" style="color:' + toggleColor + '" onclick="document.getElementById(\'qfd-' + q.id + '\').classList.toggle(\'hidden\');this.textContent=document.getElementById(\'qfd-' + q.id + '\').classList.contains(\'hidden\')?\'Details einblenden ▾\':\'Details ausblenden ▴\'">Details einblenden ▾</button>'     : '';   return '<div class="quiz-feedback ' + cls + '"><p class="quiz-feedback__label">' + label + '</p><p class="quiz-feedback__text" style="font-weight:600;">' + summary + '</p>' + detailBlock + '</div>'; }  function submitAnswer(q) {   const selected = state.answers[q.id] || [];   let correct = false;   if (q.type === 'single') {     correct = selected.length === 1 && selected[0] === q.options.find(o => o.correct)?.id;   } else {     const correctIds = q.options.filter(o => o.correct).map(o => o.id);     correct = correctIds.every(id => selected.includes(id)) && selected.every(id => correctIds.includes(id));   }   state.submitted[q.id] = { correct };   if (correct) state.score++;   renderQuestion(); }  function renderResult() {   const total = state.questions.length;   const pct = Math.round((state.score / total) * 100);   const elapsed = Math.round((Date.now() - state.startTime) / 60000);   const g = pct >= 92 ? {l:'Sehr sicher',n:'●●●●●',c:'result--1'} : pct >= 81 ? {l:'Sicher',n:'●●●●○',c:'result--2'} : pct >= 67 ? {l:'Gut vorbereitet',n:'●●●○○',c:'result--3'} : pct >= 50 ? {l:'In Entwicklung',n:'●●○○○',c:'result--4'} : {l:'Noch Übungsbedarf',n:'●○○○○',c:'result--5'};    const tiers = {};   for (const q of state.questions) {     const lbl = q._tierLabel || 'Unbekannt';     if (!tiers[lbl]) tiers[lbl] = {label: lbl, correct: 0, total: 0};     tiers[lbl].total++;     if (state.submitted[q.id]?.correct) tiers[lbl].correct++;   }   const tierRows = Object.values(tiers).map(t => {     const p = Math.round((t.correct/t.total)*100);     return '<div class="quiz-result__tier"><span class="quiz-result__tier-label">' + t.label + '</span><div class="quiz-result__tier-bar"><div class="quiz-result__tier-fill" style="width:' + p + '%"></div></div><span class="quiz-result__tier-score">' + t.correct + '/' + t.total + ' (' + p + '%)</span></div>';   }).join('');    const wrong = state.questions.filter(q => !state.submitted[q.id]?.correct);   const wrongHtml = wrong.length === 0     ? '<p class="quiz-result__all-correct">Alle Fragen korrekt beantwortet.</p>'     : wrong.map(q => {         const ca = q.options.filter(o => o.correct).map(o => o.text).join(' / ');         return '<div class="quiz-result__wrong-item"><p class="quiz-result__wrong-stem">' + q.stem + '</p><p class="quiz-result__wrong-answer"><strong>Korrekt:</strong> ' + ca + '</p></div>';       }).join('');    try { localStorage.setItem('mtr_rt_quiz_grundlagen-pruefungstraining-quiz', JSON.stringify({lastPct: pct})); } catch(e) {}    app.innerHTML = '<div class="quiz-result"><div class="quiz-result__header ' + g.c + '"><p class="quiz-result__note">' + g.n + '</p><p class="quiz-result__label">' + g.l + '</p><p class="quiz-result__score">' + state.score + ' / ' + total + ' Fragen richtig (' + pct + '%)</p><p class="quiz-result__time">Bearbeitungszeit: ca. ' + elapsed + ' Minuten</p></div><div class="quiz-result__breakdown"><h3>Auswertung nach Stufe</h3>' + tierRows + '</div><div class="quiz-result__review"><h3>Zur Wiederholung</h3>' + wrongHtml + '</div><div class="quiz-result__actions"><button class="btn btn--secondary" id="retry-btn">Neues Quiz starten</button><button class="btn btn--primary" id="transfer-btn">Zur Transferaufgabe →</button></div></div>';    document.getElementById('retry-btn').addEventListener('click', init);   document.getElementById('transfer-btn').addEventListener('click', renderTransfer); }  function renderTransfer() {   app.innerHTML = '<div class="transfer-wrapper"><span class="transfer-badge">Transferaufgabe</span><h2 class="transfer-title">' + TRANSFER.title + '</h2><div class="transfer-case"><h4>Fallsituation</h4><p>' + TRANSFER.case + '</p></div><p class="transfer-question">' + TRANSFER.question + '</p><textarea class="transfer-textarea" id="transfer-text" placeholder="Schreibe hier deine Antwort…"></textarea><div class="quiz-actions"><button class="btn btn--primary" id="show-sample-btn">Musterlösung anzeigen</button></div><div class="transfer-sample" id="transfer-sample"><h4>Musterlösung</h4><p>' + TRANSFER.sample + '</p></div><div class="transfer-checklist" id="transfer-checklist"><h4>Selbstbewertung – habe ich das berücksichtigt?</h4>' + TRANSFER.checklist.map((item, i) => '<div class="transfer-check-item"><input type="checkbox" id="chk_' + i + '"><label for="chk_' + i + '">' + item + '</label></div>').join('') + '</div><div class="quiz-actions" style="margin-top:16px"><button class="btn btn--secondary" id="back-btn">← Zurück zur Auswertung</button><button class="btn btn--primary" id="new-quiz-btn">Neues Quiz starten</button></div></div>';    document.getElementById('show-sample-btn').addEventListener('click', () => {     document.getElementById('transfer-sample').style.display = 'block';     document.getElementById('transfer-checklist').style.display = 'block';     document.getElementById('show-sample-btn').style.display = 'none';   });    document.getElementById('back-btn').addEventListener('click', renderResult);   document.getElementById('new-quiz-btn').addEventListener('click', init); }  init(); </script> <!-- MTR Feedback Widget -->
<style>
/* ── MTR Feedback Widget ─────────────────── */
#mtr-fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;
  background:#1a4f7a;color:#fff;border:none;font-size:1.4rem;cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.28);z-index:9999;transition:transform .15s,background .15s;
  display:flex;align-items:center;justify-content:center;}
#mtr-fab:hover{background:#2c6ea6;transform:scale(1.08);}
#mtr-fab.has-feedback{background:#1e6e42;}
#mtr-fb-panel{position:fixed;bottom:88px;right:16px;width:310px;background:#fff;
  border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);padding:20px;z-index:9998;
  border:1px solid #d1d9e0;animation:mtrSlideIn .18s ease;}
@keyframes mtrSlideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
#mtr-fb-panel[hidden]{display:none;}
.mtr-fb-head{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:#1a4f7a;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid #eef4fb;}
.mtr-fb-q{font-size:.88rem;font-weight:600;color:#1a1a2e;margin-bottom:8px;}
.mtr-stars{display:flex;gap:6px;margin-bottom:16px;cursor:default;}
.mtr-star{font-size:1.7rem;cursor:pointer;color:#d1d9e0;transition:color .1s;line-height:1;user-select:none;}
.mtr-star.active{color:#f0b429;}
.mtr-fb-textarea{width:100%;min-height:72px;padding:8px 10px;border:1.5px solid #d1d9e0;
  border-radius:6px;font-size:.88rem;font-family:inherit;resize:vertical;margin-bottom:12px;color:#333;line-height:1.5;}
.mtr-fb-textarea:focus{outline:none;border-color:#1a4f7a;}
.mtr-fb-actions{display:flex;gap:8px;justify-content:flex-end;}
.mtr-fb-btn{padding:8px 16px;border-radius:6px;font-size:.85rem;font-weight:600;border:none;cursor:pointer;}
.mtr-fb-save{background:#1a4f7a;color:#fff;}
.mtr-fb-save:hover{background:#2c6ea6;}
.mtr-fb-cancel{background:#f8f9fa;color:#4a5568;border:1.5px solid #d1d9e0;}
.mtr-fb-msg{font-size:.83rem;margin-bottom:8px;min-height:20px;}
.mtr-fb-saved{color:#1e6e42;font-weight:600;}
.mtr-fb-error{color:#8b1a1a;}
@media(max-width:420px){#mtr-fb-panel{width:calc(100vw - 32px);right:8px;}}
</style>
<button id="mtr-fab" title="Feedback geben" aria-label="Feedback zu diesem Modul geben">💬</button>
<div id="mtr-fb-panel" hidden role="dialog" aria-modal="true" aria-label="Modul-Feedback">
  <p class="mtr-fb-head">Feedback – Grundlagen-Quiz</p>
  <p class="mtr-fb-q">Wie hilfreich war dieses Modul?</p>
  <div class="mtr-stars" id="mtr-stars" role="group" aria-label="Bewertung">
    <span class="mtr-star" data-v="1" role="button" tabindex="0" aria-label="1 Stern">★</span>
    <span class="mtr-star" data-v="2" role="button" tabindex="0" aria-label="2 Sterne">★</span>
    <span class="mtr-star" data-v="3" role="button" tabindex="0" aria-label="3 Sterne">★</span>
    <span class="mtr-star" data-v="4" role="button" tabindex="0" aria-label="4 Sterne">★</span>
    <span class="mtr-star" data-v="5" role="button" tabindex="0" aria-label="5 Sterne">★</span>
  </div>
  <p class="mtr-fb-q">Was war unklar oder fehlt?</p>
  <textarea class="mtr-fb-textarea" id="mtr-fb-text" placeholder="Optional – Freitext…" aria-label="Kommentar"></textarea>
  <div class="mtr-fb-msg" id="mtr-fb-msg" aria-live="polite"></div>
  <div class="mtr-fb-actions">
    <button class="mtr-fb-btn mtr-fb-cancel" id="mtr-fb-cancel">Schließen</button>
    <button class="mtr-fb-btn mtr-fb-save" id="mtr-fb-save">Speichern</button>
  </div>
</div>
<script>
(function(){
  var MOD='grundlagen-pruefungstraining-quiz', KEY='mtr_rt_feedback_'+MOD;
  var fab=document.getElementById('mtr-fab');
  var panel=document.getElementById('mtr-fb-panel');
  var stars=document.querySelectorAll('.mtr-star');
  var txt=document.getElementById('mtr-fb-text');
  var msg=document.getElementById('mtr-fb-msg');
  var rating=0;
  function load(){
    try{var s=JSON.parse(localStorage.getItem(KEY));
      if(s){rating=s.rating||0;txt.value=s.text||'';setStars(rating);fab.classList.add('has-feedback');fab.title='Feedback gespeichert ✓';}
    }catch(e){}
  }
  function setStars(v){stars.forEach(function(s){s.classList.toggle('active',parseInt(s.dataset.v)<=v);});}
  fab.addEventListener('click',function(){panel.hidden=!panel.hidden;if(!panel.hidden){msg.innerHTML='';txt.focus();}});
  stars.forEach(function(s){
    s.addEventListener('click',function(){rating=parseInt(s.dataset.v);setStars(rating);});
    s.addEventListener('mouseover',function(){setStars(parseInt(s.dataset.v));});
    s.addEventListener('mouseout',function(){setStars(rating);});
    s.addEventListener('keydown',function(e){if(e.key==='Enter'||e.key===' '){rating=parseInt(s.dataset.v);setStars(rating);}});
  });
  document.getElementById('mtr-fb-cancel').addEventListener('click',function(){panel.hidden=true;});
  document.getElementById('mtr-fb-save').addEventListener('click',function(){
    if(!rating){msg.innerHTML='<span class="mtr-fb-error">Bitte zuerst Bewertung wählen.</span>';return;}
    try{
      localStorage.setItem(KEY,JSON.stringify({rating:rating,text:txt.value.trim(),module:'Grundlagen-Quiz',savedAt:new Date().toISOString()}));
      msg.innerHTML='<span class="mtr-fb-saved">✓ Feedback gespeichert</span>';
      fab.classList.add('has-feedback');fab.title='Feedback gespeichert ✓';
      setTimeout(function(){panel.hidden=true;msg.innerHTML='';},1600);
    }catch(e){msg.innerHTML='<span class="mtr-fb-error">Speichern fehlgeschlagen.</span>';}
  });
  load();
})();
</script>

</body> </html>
