<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 480" role="img" aria-label="Schematischer axialer CT-Schnitt auf Höhe der Prostata mit gefülltem Enddarm">
  <rect width="600" height="480" fill="#1f2933"/>
  <text x="300" y="40" text-anchor="middle" fill="#cbd2d9" font-family="sans-serif" font-size="18">Schematische Darstellung (Platzhalter)</text>
  <text x="300" y="62" text-anchor="middle" fill="#7b8794" font-family="sans-serif" font-size="13">später durch anonymisiertes CT-Bild ersetzen</text>

  <!-- Beckenumriss -->
  <ellipse cx="300" cy="280" rx="220" ry="160" fill="#2e3a48" stroke="#7b8794" stroke-width="2"/>

  <!-- Harnblase -->
  <ellipse cx="300" cy="220" rx="80" ry="55" fill="#3b5a7a" stroke="#cbd2d9" stroke-width="2"/>
  <text x="300" y="225" text-anchor="middle" fill="#cbd2d9" font-family="sans-serif" font-size="14">Harnblase</text>

  <!-- Prostata (leicht ventralisiert) -->
  <ellipse cx="300" cy="300" rx="38" ry="32" fill="#8a5a3b" stroke="#f0a500" stroke-width="2"/>
  <text x="300" y="305" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13">Prostata</text>

  <!-- Enddarm (stark gefüllt) -->
  <ellipse cx="300" cy="370" rx="55" ry="45" fill="#6b4226" stroke="#f0a500" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="300" y="375" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="13">Enddarm (gefüllt)</text>

  <!-- Pfeil zur Verschiebung -->
  <line x1="380" y1="300" x2="440" y2="270" stroke="#f0a500" stroke-width="2"/>
  <polygon points="440,270 430,276 432,264" fill="#f0a500"/>
  <text x="460" y="268" fill="#f0a500" font-family="sans-serif" font-size="13">ventrale</text>
  <text x="460" y="285" fill="#f0a500" font-family="sans-serif" font-size="13">Verlagerung</text>
</svg>
